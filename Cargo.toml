[package]
name = "rustgremlin"
version = "0.1.0"
edition = "2021"

[features]
default = ["inmemory"]
inmemory = []
mmap = ["memmap2"]
full-text = ["tantivy"]

[dependencies]
thiserror = "1.0"
hashbrown = "0.14"
smallvec = "1.11"
serde = { version = "1.0", features = ["derive"] }
parking_lot = "0.12"
roaring = "0.10"
regex = "1.10"
memmap2 = { version = "0.9", optional = true }
tantivy = { version = "0.21", optional = true }
crc32fast = "1.3"

[dev-dependencies]
criterion = "0.5"
proptest = "1.4"
tempfile = "3.10"
serde_json = "1.0"

[[bench]]
name = "traversal"
harness = false
